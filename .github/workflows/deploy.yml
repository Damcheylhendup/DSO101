name: Docker Build Push and Render Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/be-todo:02250347 ./Damcheylhendup_02250347_DSO101_A1/todo-app/backend

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/be-todo:02250347

      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}